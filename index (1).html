<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Navigation 18 Calculator — A modern glassmorphism calculator built for CodeAlpha Internship" />
  <title>Navigation 18 — Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Theme Toggle ── -->
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark/light mode" title="Toggle Theme">
    <span class="toggle-icon" id="themeIcon">☀️</span>
  </button>

  <!-- ── History Toggle ── -->
  <button class="history-toggle" id="historyToggle" aria-label="Toggle history panel" title="Calculation History">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
    </svg>
  </button>

  <!-- ── Main Wrapper ── -->
  <main class="page-center">

    <!-- History Panel -->
    <aside class="history-panel" id="historyPanel" aria-label="Calculation history">
      <div class="history-header">
        <h2>History</h2>
        <button class="clear-history-btn" id="clearHistory" aria-label="Clear history">Clear</button>
      </div>
      <ul class="history-list" id="historyList">
        <li class="history-empty">No calculations yet</li>
      </ul>
    </aside>

    <!-- Calculator -->
    <section class="calculator" role="main" aria-label="Calculator">

      <!-- Brand -->
      <div class="calc-brand">
        <span class="brand-dot"></span>
        <span class="brand-name">NAV 18</span>
      </div>

      <!-- Display -->
      <div class="display" aria-live="polite" aria-label="Calculator display">
        <div class="display-expression" id="expression" aria-label="Current expression"></div>
        <div class="display-result" id="result" aria-label="Current value">0</div>
      </div>

      <!-- Button Grid -->
      <div class="btn-grid" role="group" aria-label="Calculator buttons">

        <!-- Row 1 -->
        <button class="btn btn-func btn-wide" data-action="clear" aria-label="Clear all">C</button>
        <button class="btn btn-func" data-action="percent" aria-label="Percentage">%</button>
        <button class="btn btn-func" data-action="backspace" aria-label="Delete last character">⌫</button>
        <button class="btn btn-op" data-action="operator" data-value="÷" aria-label="Divide">÷</button>

        <!-- Row 2 -->
        <button class="btn btn-num" data-action="digit" data-value="7" aria-label="7">7</button>
        <button class="btn btn-num" data-action="digit" data-value="8" aria-label="8">8</button>
        <button class="btn btn-num" data-action="digit" data-value="9" aria-label="9">9</button>
        <button class="btn btn-op" data-action="operator" data-value="×" aria-label="Multiply">×</button>

        <!-- Row 3 -->
        <button class="btn btn-num" data-action="digit" data-value="4" aria-label="4">4</button>
        <button class="btn btn-num" data-action="digit" data-value="5" aria-label="5">5</button>
        <button class="btn btn-num" data-action="digit" data-value="6" aria-label="6">6</button>
        <button class="btn btn-op" data-action="operator" data-value="-" aria-label="Subtract">−</button>

        <!-- Row 4 -->
        <button class="btn btn-num" data-action="digit" data-value="1" aria-label="1">1</button>
        <button class="btn btn-num" data-action="digit" data-value="2" aria-label="2">2</button>
        <button class="btn btn-num" data-action="digit" data-value="3" aria-label="3">3</button>
        <button class="btn btn-op" data-action="operator" data-value="+" aria-label="Add">+</button>

        <!-- Row 5 -->
        <button class="btn btn-num btn-zero" data-action="digit" data-value="0" aria-label="0">0</button>
        <button class="btn btn-num" data-action="decimal" aria-label="Decimal point">.</button>
        <button class="btn btn-equals" data-action="equals" aria-label="Equals">=</button>

      </div>
      <!-- /btn-grid -->

    </section>
    <!-- /calculator -->

  </main>

  <script src="script.js"></script>
</body>
</html>
